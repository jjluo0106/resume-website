name: 自動化部署前端網頁至 AWS S3 & CloudFront

# 觸發條件：當 main 分支收到 git push 時，自動執行此工作流
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 將 GitHub 倉庫的程式碼簽出 (Checkout) 到這台虛擬執行機上
    - name: 簽出原始碼
      uses: actions/checkout@v4

    # 2. 設定 AWS 憑證驗證環境
    - name: 配置 AWS 憑證環境
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # 你的 S3 所在區域

    # 3. 同步本地檔案到 S3，並同步刪除 S3 上已經被本地移除的檔案 (--delete)
    - name: 同步網頁檔案至 S3 儲存桶
      run: |
        # 只部署「靜態網站」檔案，避免把 infra/.github 等原始碼同步到公開桶
        aws s3 sync . s3://azhe-cloud-resume-bucket-2026 --delete \
          --exclude "*" \
          --include "index.html" \
          --include "admin.html" \
          --include "js/*" \
          --include "images/*" \
          --include "assets/*"

    # 4. 透過 AWS CLI 自動建立 CloudFront 快取失效判定，讓全球節點即時同步最新網頁
    - name: 清除 CloudFront 邊緣節點快取
      run: |
        aws cloudfront create-invalidation --distribution-id E31C2PO3N0MIW5 --paths "/*"