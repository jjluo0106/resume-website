<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理端｜聯絡表單訊息</title>
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        --bg: #0b1020;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.12);
        --card: rgba(255, 255, 255, 0.06);
        --ring: 0 0 0 4px rgba(124, 92, 255, 0.22);
        --accent: #7c5cff;
        --accent2: #23c6ff;
        --radius: 16px;
        --max: 1100px;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f8fb;
          --text: rgba(10, 14, 30, 0.92);
          --muted: rgba(10, 14, 30, 0.72);
          --border: rgba(10, 14, 30, 0.12);
          --card: rgba(10, 14, 30, 0.04);
          --ring: 0 0 0 4px rgba(124, 92, 255, 0.18);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
        background: radial-gradient(
            1100px 700px at 18% 8%,
            rgba(124, 92, 255, 0.28),
            transparent 52%
          ),
          radial-gradient(
            900px 620px at 86% 10%,
            rgba(35, 198, 255, 0.22),
            transparent 55%
          ),
          linear-gradient(180deg, var(--bg), rgba(0, 0, 0, 0));
        color: var(--text);
        line-height: 1.6;
      }
      .container {
        width: min(var(--max), calc(100% - 40px));
        margin: 0 auto;
        padding: 22px 0 40px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .title {
        display: grid;
        gap: 4px;
      }
      .title h1 {
        margin: 0;
        font-size: 22px;
      }
      .title p {
        margin: 0;
        color: var(--muted);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        font-weight: 650;
      }
      .btn-primary {
        border-color: rgba(124, 92, 255, 0.45);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: rgba(255, 255, 255, 0.96);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
        min-width: min(520px, 100%);
      }
      input:focus {
        box-shadow: var(--ring);
      }
      .card {
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--card), rgba(255, 255, 255, 0));
        border-radius: var(--radius);
        padding: 14px;
      }
      .status {
        color: var(--muted);
        margin: 10px 0 14px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .item h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      .item .meta {
        color: var(--muted);
        font-size: 13px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .item pre {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12.5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="title">
          <h1>管理端｜聯絡表單訊息</h1>
          <p>此頁面會呼叫 Serverless API（需要 `x-admin-key`）。</p>
        </div>
        <div class="row">
          <a class="btn" href="/#contact">回首頁</a>
          <button class="btn btn-primary" id="reload">重新載入</button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <input
            id="admin-key"
            placeholder="輸入 Admin Key（會存在本機瀏覽器）"
          />
        </div>
        <div class="status" id="status">尚未載入</div>
        <div class="list" id="list"></div>
      </div>
    </div>

    <script src="/js/profile.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
